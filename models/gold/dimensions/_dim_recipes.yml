version: 2

models:
  - name: dim_recipes
    description: "Dimensión de recetas de NutriTrack con atributos descriptivos.
                  Las métricas nutricionales calculadas (calorías, proteínas, etc.)
                  se encuentran en fct_recipe_nutrition siguiendo el modelo Kimball."
    columns:
      - name: recipe_id
        description: "PK - Identificador único de la receta (UUID)"
        tests:
          - unique
          - not_null
      - name: nutritionist_id
        description: "FK - Identificador del nutricionista que creó la receta (UUID)"
        tests:
          - not_null
      - name: recipe_name
        description: "Nombre de la receta. Puede ser nulo (10 registros)."
      - name: category
        description: "Categoría de la receta normalizada a inglés"
        tests:
          - accepted_values:
              arguments:
                values: ['breakfast', 'lunch', 'dinner', 'snack', 'pre_workout', 'post_workout']
      - name: prep_time_min
        description: "Tiempo de preparación en minutos"
      - name: servings
        description: "Número de porciones"
      - name: created_at
        description: "Fecha de creación de la receta"