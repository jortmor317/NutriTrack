version: 2

models:
  - name: fct_subscriptions
    description: "Fact de suscripciones de NutriTrack.
                  Granularidad: una fila por suscripción (subscription_id).
                  Cada fila representa el ciclo de vida completo de una suscripción
                  de un usuario a un plan, incluyendo revenue, descuentos y cancelaciones.
                  status, cancellation_reason y cancelled_at son degenerate dimensions —
                  atributos de la transacción sin dimensión propia, concepto aceptado en Kimball.
                  revenue y discount_amount se calculan en la fact porque dependen del precio
                  del plan en el momento de la contratación, no del precio actual."
    columns:
      - name: subscription_id
        description: "PK - Identificador único de la suscripción (UUID)"
        tests:
          - unique
          - not_null
      - name: user_id
        description: "FK - Identificador del usuario (INTEGER) → dim_users"
        tests:
          - not_null
      - name: plan_id
        description: "FK - Identificador del plan (UUID) → dim_subscription_plans"
        tests:
          - not_null
      - name: promo_id
        description: "FK - Identificador de la promoción (UUID) → dim_promos. Nulo si no se aplicó promo"
      - name: start_date
        description: "FK - Fecha de inicio → dim_dates"
        tests:
          - not_null
      - name: end_date
        description: "Fecha de fin de la suscripción. Nula si está activa"
      - name: status
        description: "Degenerate dimension — estado de la suscripción (active, cancelled, inactive)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'cancelled', 'inactive']
      - name: revenue
        description: "Revenue generado por la suscripción aplicando descuento si existe.
                      Se calcula en la fact porque depende del precio vigente en el momento
                      de la contratación, no del precio actual del plan."
        tests:
          - not_null
      - name: discount_amount
        description: "Importe descontado en valor absoluto. 0 si no se aplicó promo"
        tests:
          - not_null
      - name: duration_days
        description: "Días de duración de la suscripción. Si está activa se calcula hasta hoy"
        tests:
          - not_null
      - name: had_promo
        description: "Flag — indica si la suscripción se contrató con promoción"
        tests:
          - not_null
      - name: is_cancelled
        description: "Flag — indica si la suscripción fue cancelada"
        tests:
          - not_null
      - name: cancellation_reason
        description: "Degenerate dimension — motivo de cancelación. Nulo si no fue cancelada"
      - name: cancelled_at
        description: "Degenerate dimension — fecha de cancelación. Nula si no fue cancelada"
      - name: created_at
        description: "Timestamp de creación — usado para carga incremental"
        tests:
          - not_null