version: 2

models:
  - name: fct_food_logs
    description: "Fact de registros de comidas de NutriTrack.
                  Granularidad: una fila por item de comida registrado (food_log_item_id).
                  Cada fila representa un alimento consumido en una comida concreta,
                  con métricas nutricionales calculadas según la cantidad consumida
                  usando datos oficiales USDA (SR Legacy).
                  meal_type y notes son degenerate dimensions — atributos de la transacción
                  sin dimensión propia, concepto aceptado en modelado Kimball.
                  target_* son métricas de contexto del usuario en el momento del registro."
    columns:
      - name: food_log_item_id
        description: "PK - Identificador único del item de comida (UUID)"
        tests:
          - unique
          - not_null
      - name: food_log_id
        description: "FK - Identificador del registro de comida (UUID)"
        tests:
          - not_null
      - name: user_id
        description: "FK - Identificador del usuario (INTEGER) → dim_users"
        tests:
          - not_null
      - name: meal_plan_id
        description: "FK - Identificador del plan de comida (UUID) → dim_meal_plans"
      - name: log_date
        description: "FK - Fecha del registro → dim_dates"
        tests:
          - not_null
      - name: meal_type
        description: "Degenerate dimension — tipo de comida (breakfast, lunch, dinner, snack).
                      Atributo de la transacción sin dimensión propia según Kimball."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['breakfast', 'lunch', 'dinner', 'snack']
      - name: food_id
        description: "FK - Identificador USDA del alimento (fdc_id) → dim_foods"
        tests:
          - not_null
      - name: quantity_g
        description: "Cantidad consumida en gramos.
                      Bronze contenía valores negativos (error de sistema origen)
                      que se convierten a 0 — cantidad desconocida pero registro válido."
        tests:
          - not_null
      - name: calories_consumed
        description: "Calorías consumidas: calories_kcal * quantity_g / 100"
      - name: protein_consumed_g
        description: "Proteínas consumidas en gramos"
      - name: carbs_consumed_g
        description: "Carbohidratos consumidos en gramos"
      - name: fat_consumed_g
        description: "Grasas consumidas en gramos"
      - name: fiber_consumed_g
        description: "Fibra consumida en gramos"
      - name: calcium_consumed_mg
        description: "Calcio consumido en miligramos"
      - name: iron_consumed_mg
        description: "Hierro consumido en miligramos"
      - name: sodium_consumed_mg
        description: "Sodio consumido en miligramos"
      - name: potassium_consumed_mg
        description: "Potasio consumido en miligramos"
      - name: vitamin_c_consumed_mg
        description: "Vitamina C consumida en miligramos"
      - name: vitamin_a_consumed_iu
        description: "Vitamina A consumida en UI"
      - name: target_calories
        description: "Métrica de contexto — objetivo calórico diario del usuario en el momento del registro"
      - name: target_protein_g
        description: "Métrica de contexto — objetivo de proteínas diarias del usuario"
      - name: target_carbs_g
        description: "Métrica de contexto — objetivo de carbohidratos diarios del usuario"
      - name: target_fat_g
        description: "Métrica de contexto — objetivo de grasas diarias del usuario"
      - name: pct_daily_calories
        description: "KPI — porcentaje del objetivo calórico diario cubierto por este item"
      - name: notes
        description: "Degenerate dimension — notas del registro de comida"
      - name: created_at
        description: "Timestamp de creación — usado para carga incremental"
        tests:
          - not_null