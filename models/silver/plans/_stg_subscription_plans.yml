version: 2

models:
  - name: stg_subscription_plans
    description: "Planes de suscripción disponibles en NutriTrack limpios y estandarizados."
    columns:
      - name: plan_id
        description: "PK - Identificador único del plan (UUID)"
        tests:
          - unique
          - not_null
      - name: plan_name
        description: "Nombre del plan"
        tests:
          - unique
          - not_null
      - name: price
        description: "Precio del plan"
        tests:
          - not_null
      - name: billing_period
        description: "Periodo de facturación del plan"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['monthly', 'annual']