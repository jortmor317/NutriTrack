version: 2

models:
  - name: stg_meal_plans
    description: "Planes de comida de usuarios limpios y estandarizados.
                  Campos con nulos: daily_protein_g (115), daily_carbs_g (123), 
                  daily_fat_g (133), end_date (167). Pendiente de estrategia
                  de imputación con negocio para campos nutricionales."
    columns:
      - name: meal_plan_id
        description: "PK - Identificador único del plan de comida (UUID)"
        tests:
          - unique
          - not_null
      - name: user_id
        description: "FK - Identificador del usuario (INTEGER)"
        tests:
          - not_null
      - name: nutritionist_id
        description: "FK - Identificador del nutricionista (UUID)"
        tests:
          - not_null
      - name: meal_plan_name
        description: "Nombre del plan de comida. Puede ser nulo (60 registros)."
        
      - name: daily_calories
        description: "Objetivo de calorías diarias"
        tests:
          - not_null
      - name: daily_protein_g
        description: "Objetivo de proteínas diarias en gramos. Puede ser nulo (115 registros)."
      - name: daily_carbs_g
        description: "Objetivo de carbohidratos diarios en gramos. Puede ser nulo (123 registros)."
      - name: daily_fat_g
        description: "Objetivo de grasas diarias en gramos. Puede ser nulo (133 registros)."
      - name: start_date
        description: "Fecha de inicio del plan"
        tests:
          - not_null
      - name: end_date
        description: "Fecha de fin del plan. Puede ser nula si el plan está activo."
      - name: is_active
        description: "Indica si el plan está activo"
        tests:
          - not_null